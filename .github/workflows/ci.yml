name: CI

on:
  push:
    branches:
      - master
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "release/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt "core/test; doobie/test; munit/test"

  test-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Run example tests (requires Docker)
        run: sbt "example/test"

  site-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(gh release view --json tagName -q .tagName | sed 's/^v//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Substitute version placeholder
        run: find docs -name '*.md' -exec sed -i "s/@VERSION@/$VERSION/g" {} +
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run mdoc
        run: sbt docs/mdoc

      - name: Install npm deps
        run: npm ci

      - name: Build VitePress
        run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  site-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: site-build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5